name: build

on:
  push:
    branches: [main, omp-experiment, pfor-experiment]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # OpenMP runtime — Linux gcc and Windows MSVC ship it inline.
      # Apple clang does not, so install brew libomp for the omp-experiment
      # branch. Harmless on the branches that don't link OpenMP.
      - name: Install libomp (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel
