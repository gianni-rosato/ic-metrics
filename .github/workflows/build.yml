name: build

on:
  push:
    branches: [main, omp-experiment, pfor-experiment]
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # lfs: false (also the default) — LFS downloads count against the
      # org bandwidth quota and the docs PNG isn't needed to build.
      # No submodules: recursive — IC_METRICS_BUILD_COMPARE=OFF below
      # skips the third-party impls, so the submodules aren't needed.
      - uses: actions/checkout@v4
        with:
          lfs: false

      # OpenMP runtime — Linux gcc and Windows MSVC ship it inline.
      # Apple clang does not, so install brew libomp for the omp-experiment
      # branch. Harmless on the branches that don't link OpenMP.
      - name: Install libomp (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Configure
        # IC_METRICS_BUILD_COMPARE=OFF skips the cross-impl harness — that
        # would otherwise drag in libjxl + Highway (cloudinary), cargo
        # (rust-av), and zig (fssimu2). CI just verifies the core library +
        # ssimudiff + bench build on each platform.
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DIC_METRICS_BUILD_COMPARE=OFF

      - name: Build
        run: cmake --build build --config Release --parallel
